---
- name: Verify
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert exim4 is enabled and running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['exim4.service'].state == 'running'
          - ansible_facts.services['exim4.service'].status in ['enabled', 'generated']

    - name: Check exim loads its configuration
      ansible.builtin.command: exim -bV
      register: exim4_verify_bv
      changed_when: false

    - name: Assert exim runs from the generated Debian configuration
      ansible.builtin.assert:
        that:
          - "'config.autogenerated' in exim4_verify_bv.stdout"

    - name: Query the configured local domains
      ansible.builtin.command: exim -bP +local_domains
      register: exim4_verify_local_domains
      changed_when: false

    - name: Assert the sender hostname and mailname are local domains
      ansible.builtin.assert:
        that:
          - exim4_sender_hostname in exim4_verify_local_domains.stdout
          - exim4_mailname in exim4_verify_local_domains.stdout

    - name: Query the configured listening interfaces
      ansible.builtin.command: exim -bP local_interfaces
      register: exim4_verify_interfaces
      changed_when: false

    - name: Assert exim only listens on loopback
      ansible.builtin.assert:
        that:
          - "'127.0.0.1' in exim4_verify_interfaces.stdout"

    - name: Read update-exim4.conf.conf
      ansible.builtin.slurp:
        src: /etc/exim4/update-exim4.conf.conf
      register: exim4_verify_conf

    - name: Assert internet configtype and sender hostname are configured
      ansible.builtin.assert:
        that:
          - "\"dc_eximconfig_configtype='internet'\" in exim4_verify_conf.content | b64decode"
          - "\"dc_other_hostnames='\" ~ exim4_sender_hostname ~ \" ; \" ~ exim4_mailname ~ \"'\" in exim4_verify_conf.content | b64decode"

    - name: Read mailname
      ansible.builtin.slurp:
        src: /etc/mailname
      register: exim4_verify_mailname

    - name: Assert mailname is set
      ansible.builtin.assert:
        that:
          - exim4_verify_mailname.content | b64decode == exim4_mailname ~ "\n"

    # postmaster's alias to root gets qualified with /etc/mailname, so this
    # routes only because the role includes the mailname in the local domains
    # (the #126 regression).
    - name: Route mail to postmaster as a local delivery smoke test
      ansible.builtin.command: exim -bt postmaster@localhost
      register: exim4_verify_routing
      changed_when: false

    - name: Assert postmaster resolves to local delivery
      ansible.builtin.assert:
        that:
          - "'transport = address_file' in exim4_verify_routing.stdout or 'router = local_user' in exim4_verify_routing.stdout"
