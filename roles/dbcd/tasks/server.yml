---
# This is to be applied to the machine that serves the database dumps

# rsync ships /usr/bin/rrsync since bookworm, which the forced commands in the
# authorized keys below invoke
- name: Install rsync
  ansible.builtin.apt:
    pkg: rsync
    state: present
    update_cache: true
    cache_valid_time: 3600

# Attributes must match the base role's group so the two stay idempotent
- name: Create ssh-users group
  ansible.builtin.group:
    name: ssh-users
    system: true

- name: "Create user"
  ansible.builtin.user:
    name: "{{ dbcd_server_user }}"
    password: "*"
    append: true
    groups: ssh-users
    shell: /bin/dash

- name: "Assign authorized keys"
  vars:
    dbcd_server_write_keys:
      - 'command="rrsync -wo {{ dbcd_data_dir }}" {{ dbcd_server_client_public_key }}'
    dbcd_server_read_keys: >-
      {{ dbcd_server_consumer_public_keys
         | map('ansible.builtin.regex_replace', '^', 'command="rrsync -ro ' ~ dbcd_data_dir ~ '" ')
         | list }}
  ansible.posix.authorized_key:
    user: "{{ dbcd_server_user }}"
    key: "{{ (dbcd_server_write_keys + dbcd_server_read_keys) | join('\n') }}"
    exclusive: true

- name: "Create directory"
  ansible.builtin.file:
    path: "{{ dbcd_data_dir }}"
    state: directory
    owner: "{{ dbcd_server_user }}"
    group: "{{ dbcd_server_user }}"
    mode: "0750"
