---
base_system_locales:
  - "en_US.UTF-8"
  - "en_GB.UTF-8"
base_system_default_locale: en_GB.UTF-8
base_system_timezone: Europe/London
base_system_packages: []
base_dns_primary_nameserver: 1.1.1.1
base_dns_secondary_nameserver: 1.0.0.1
base_default_users: []
base_users: []
base_local_hostnames: []
base_known_hosts: []
base_ssh_extra_user_groups: []
base_ssh_allow_tcp_forwarding: false
base_default_system_packages:
  - ssl-cert
  - acl
  - curl
  - wget
  - vim
  - nano
  - rsync
  - locales
  - zip
  - screen
  - htop
  - apt-transport-https
  - man-db
  - gpg
  - zstd
base_use_backports: "{{ ansible_facts['distribution_release'] == 'bookworm' }}"
base_profile_config: []
base_config_dhclient: "{{ ansible_facts['distribution_release'] == 'bookworm' }}"
# In-place /etc/hosts writes for containers, where the bind mount breaks the
# default atomic rename.
base_hosts_unsafe_writes: false
