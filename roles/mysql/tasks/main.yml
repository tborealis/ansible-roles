---
- name: Install deb822 dependency
  ansible.builtin.apt:
    pkg: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add MySQL repository
  ansible.builtin.deb822_repository:
    name: mysql
    types: [deb]
    uris: https://repo.mysql.com/apt/debian/
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: "mysql-{{ mysql_version }}"
    signed_by: /etc/apt/keyrings/mysql-repo.gpg
  register: mysql_repo

- name: Find legacy MySQL list file
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    contains: 'repo\.mysql\.com'
    read_whole_file: true
  register: mysql_legacy_list

- name: Remove legacy MySQL list file
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ mysql_legacy_list.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Update apt cache after adding repository # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: mysql_repo is changed

- name: Check if MySQL server installed
  ansible.builtin.shell: dpkg-query -W -f='${db:Status-Abbrev}' mysql-server || true
  changed_when: false
  register: mysql_installed

- name: Install MySQL server
  ansible.builtin.apt:
    pkg: mysql-server,python3-pymysql
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Stop MySQL if fresh install
  ansible.builtin.service:
    name: mysql
    state: stopped
  when: mysql_installed.stdout != "ii "

- name: Configure
  ansible.builtin.template:
    src: tuning.cnf.j2
    dest: /etc/mysql/conf.d/tuning.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mysql

- name: Start MySQL if fresh install
  ansible.builtin.service:
    name: mysql
    state: started
  when: mysql_installed.stdout != "ii "

# The dummy password is deliberate: the 1524 plugin error precedes password
# verification, and a fixed non-secret value can never be masked out of the
# registered error message by no_log censoring (unlike the real password).
- name: Check MySQL root auth plugin
  ansible.mysql.mysql_info:
    filter: version
    login_user: root
    login_password: plugin-probe
    login_unix_socket: "{{ mysql_login_unix_socket }}"
  register: mysql_root_login
  failed_when: false
  changed_when: false

- name: Register whether mysql_native_password is disabled
  ansible.builtin.set_fact:
    mysql_native_password_disabled: "{{ \"Plugin 'mysql_native_password' is not loaded\" in mysql_root_login.msg | default('') }}"

- name: Fail if mysql_native_password cannot be enabled
  ansible.builtin.fail:
    msg: >-
      root still authenticates with mysql_native_password but MySQL
      {{ mysql_version }} has removed the plugin. Install 8.4-lts to
      migrate authentication first.
  when:
    - mysql_native_password_disabled
    - not (mysql_version | string).startswith('8')

- name: Enable mysql_native_password for auth migration
  ansible.builtin.copy:
    content: |
      [mysqld]
      mysql_native_password=ON
    dest: /etc/mysql/conf.d/native_password_migration.cnf
    owner: root
    group: root
    mode: "0644"
  when: mysql_native_password_disabled

- name: Restart MySQL to load mysql_native_password
  ansible.builtin.service:
    name: mysql
    state: restarted
  when: mysql_native_password_disabled

- name: Set MySQL root password
  ansible.mysql.mysql_user:
    name: root
    host_all: true
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: "{{ mysql_login_unix_socket }}"
    plugin: caching_sha2_password
    plugin_auth_string: "{{ mysql_root_password }}"
    salt: "{{ mysql_root_password_salt | default(omit) }}"
    check_implicit_admin: true
    column_case_sensitive: true

- name: Remove redundant root users
  ansible.mysql.mysql_user:
    name: root
    host: "{{ item }}"
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: "{{ mysql_login_unix_socket }}"
  loop:
    - 127.0.0.1
    - "::1"

- name: Create databases
  ansible.mysql.mysql_db:
    name: "{{ item.name }}"
    collation: "{{ item.collation | default('utf8_general_ci') }}"
    encoding: "{{ item.encoding | default('utf8') }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: "{{ mysql_login_unix_socket }}"
  with_items: "{{ mysql_databases }}"

- name: Create users
  ansible.mysql.mysql_user:
    name: "{{ item.name }}"
    host: "{{ item.host | default('localhost') }}"
    plugin: caching_sha2_password
    plugin_auth_string: "{{ item.password }}"
    salt: "{{ item.salt | default(omit) }}"
    priv: "{{ item.priv | default('*.*:USAGE') }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: "{{ mysql_login_unix_socket }}"
    column_case_sensitive: true
  no_log: false
  loop_control:
    label: "{{ item.name }}@{{ item.host | default('localhost') }}"
  with_items: "{{ mysql_users }}"

- name: Remove temporary mysql_native_password config
  ansible.builtin.file:
    path: /etc/mysql/conf.d/native_password_migration.cnf
    state: absent
  notify: Restart mysql

- name: Restart MySQL if notified
  ansible.builtin.meta: flush_handlers
