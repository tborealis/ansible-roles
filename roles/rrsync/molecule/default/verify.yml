---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:

    - name: Assert rsync is installed
      ansible.builtin.assert:
        that:
          - "'rsync' in ansible_facts.packages"

    - name: Stat the rrsync link
      ansible.builtin.stat:
        path: /usr/local/bin/rrsync
        follow: false
      register: rrsync_verify_link

    - name: Assert rrsync is a symlink to the packaged script
      ansible.builtin.assert:
        that:
          - rrsync_verify_link.stat.islnk
          - rrsync_verify_link.stat.lnk_source == '/usr/bin/rrsync'

    - name: Stat the rrsync link target
      ansible.builtin.stat:
        path: /usr/local/bin/rrsync
        follow: true
      register: rrsync_verify_target

    - name: Assert the link target is an executable file
      ansible.builtin.assert:
        that:
          - rrsync_verify_target.stat.exists
          - rrsync_verify_target.stat.isreg
          - rrsync_verify_target.stat.executable

    - name: Run rrsync without arguments
      ansible.builtin.command: /usr/local/bin/rrsync
      register: rrsync_verify_usage
      changed_when: false
      failed_when: rrsync_verify_usage.rc == 0

    - name: Assert rrsync rejects the call with its usage message
      ansible.builtin.assert:
        that:
          - "'arguments are required' in (rrsync_verify_usage.stdout ~ rrsync_verify_usage.stderr)"
