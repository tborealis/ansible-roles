---
- name: Install GPG
  ansible.builtin.apt:
    pkg: gpg
    state: present
    update_cache: false

# Base path is ansible folder
- name: Add key
  ansible.builtin.copy:
    content: "{{ lookup('file', key_path) }}"
    dest: "/etc/apt/trusted.gpg.d/{{ key_path | basename }}"
    owner: root
    group: root
    mode: "0644"
