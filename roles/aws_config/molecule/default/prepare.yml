---
# The role configures existing accounts; other roles create the accounts on
# real hosts, which is not part of the aws_config role's contract.
- name: Prepare
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Create test user
      ansible.builtin.user:
        name: "{{ aws_config_molecule_user }}"
        shell: /bin/bash
        create_home: true
