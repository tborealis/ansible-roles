---
- name: Assert pgsql_mode is valid
  ansible.builtin.assert:
    that:
      - pgsql_mode in ['server', 'client']
    fail_msg: pgsql_mode must be "server" or "client".

- name: Assert pgsql_version is set
  ansible.builtin.assert:
    that:
      - pgsql_version is defined
    fail_msg: >-
      pgsql_version must be set to the PostgreSQL major version to install.

- name: Assert pgsql_version is a supported server major
  ansible.builtin.assert:
    that:
      - pgsql_version | string in pgsql_supported_versions | map('string') | list
    fail_msg: >-
      In server mode pgsql_version must be a PostgreSQL major the role ships
      config templates for ({{ pgsql_supported_versions | join(', ') }}).
  when: pgsql_mode == 'server'

- name: Set up the PGDG repository and client tools
  ansible.builtin.import_tasks: client.yml

- name: Install and configure the PostgreSQL server
  ansible.builtin.import_tasks: server.yml
  when: pgsql_mode == 'server'
