---
- name: Verify
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Run psql # noqa: command-instead-of-module (functional check that the binary works)
      ansible.builtin.command: psql --version
      changed_when: false
      register: pgsql_verify_psql

    - name: Assert psql is the requested major version
      ansible.builtin.assert:
        that:
          - pgsql_verify_psql.stdout is search('^psql \(PostgreSQL\) ' ~ pgsql_version ~ '\.')

    - name: Gather package facts
      ansible.builtin.package_facts:

    - name: Assert the client package was installed from the PGDG repository
      ansible.builtin.assert:
        that:
          - "'pgdg' in ansible_facts.packages['postgresql-client-' ~ pgsql_version][0].version"

    - name: Assert no server package was installed
      ansible.builtin.assert:
        that:
          - ('postgresql-' ~ pgsql_version) not in ansible_facts.packages

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert no PostgreSQL cluster service exists
      ansible.builtin.assert:
        that:
          - ansible_facts.services.keys() | select('match', 'postgresql@') | list | length == 0

    - name: Read the PGDG apt source
      ansible.builtin.slurp:
        src: /etc/apt/sources.list.d/postgresql.sources
      register: pgsql_verify_source

    - name: Assert the PGDG source targets this release and the shared keyring
      ansible.builtin.assert:
        that:
          - "'URIs: https://apt.postgresql.org/pub/repos/apt/' in pgsql_verify_source.content | b64decode"
          - "'Signed-By: /etc/apt/keyrings/postgresql.gpg' in pgsql_verify_source.content | b64decode"
          - (ansible_facts['distribution_release'] ~ '-pgdg') in pgsql_verify_source.content | b64decode
