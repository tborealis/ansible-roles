---
# Values shared by converge.yml and verify.yml. Throwaway test credentials
# with a realistic shape, never real ones.
# The role has no default for pgsql_version; server mode supports 15-18 via
# one unified template, and PGDG publishes all of them for bookworm and
# trixie. Split the coverage across the platforms: bookworm exercises the
# widely deployed 15, trixie the newest major 18 (which also proves the
# io_method conditional renders).
pgsql_version: "{{ 15 if ansible_facts['distribution_release'] == 'bookworm' else 18 }}"
pgsql_molecule_user_password: molecule-Pgsql-Passw0rd1
