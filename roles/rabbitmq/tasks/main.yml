---
- name: Install deb822 dependency
  ansible.builtin.apt:
    pkg: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add RabbitMQ Erlang repository
  ansible.builtin.deb822_repository:
    name: rabbitmq-erlang
    types: [deb]
    uris: "https://deb1.rabbitmq.com/rabbitmq-erlang/debian/{{ ansible_facts['distribution_release'] }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /etc/apt/keyrings/rabbitmq.gpg
  register: rabbitmq_erlang_repo

- name: Add RabbitMQ server repository
  ansible.builtin.deb822_repository:
    name: rabbitmq-server
    types: [deb]
    uris: "https://deb1.rabbitmq.com/rabbitmq-server/debian/{{ ansible_facts['distribution_release'] }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /etc/apt/keyrings/rabbitmq.gpg
  register: rabbitmq_server_repo

- name: Prefer RabbitMQ upstream Erlang packages
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/rabbitmq-erlang.pref
    content: |
      Package: erlang*
      Pin: origin deb1.rabbitmq.com
      Pin-Priority: 1000
    owner: root
    group: root
    mode: "0644"

- name: Remove superseded RabbitMQ repository file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/rabbitmq.sources
    state: absent

- name: Find legacy RabbitMQ list file
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    contains: 'rabbitmq\.com'
    read_whole_file: true
  register: rabbitmq_legacy_list

- name: Remove legacy RabbitMQ list file
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ rabbitmq_legacy_list.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Update apt cache after adding repositories # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: rabbitmq_erlang_repo is changed or rabbitmq_server_repo is changed

- name: Install RabbitMQ
  ansible.builtin.apt:
    pkg: rabbitmq-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable and start RabbitMQ
  ansible.builtin.systemd:
    name: rabbitmq-server
    enabled: true
    state: started

- name: Install RabbitMQ management plugin
  community.rabbitmq.rabbitmq_plugin:
    names: rabbitmq_management
    state: enabled

- name: Remove guest user
  community.rabbitmq.rabbitmq_user:
    user: guest
    state: absent

- name: Create admin user
  community.rabbitmq.rabbitmq_user:
    user: admin
    password: "{{ rabbitmq_admin_password }}"
    tags: administrator
    vhost: /
    configure_priv: .*
    read_priv: .*
    write_priv: .*
