---
# The per-user config tasks rely on the account existing; on real hosts other
# roles create the accounts, which is not part of the role's contract.
- name: Prepare
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Create test user
      ansible.builtin.user:
        name: "{{ aws_cli_molecule_user }}"
        shell: /bin/bash
        create_home: true
