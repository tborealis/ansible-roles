---
# The role writes files into existing directories for existing users;
# creating those is outside its contract.
- name: Prepare
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Create app user
      ansible.builtin.user:
        name: "{{ env_file_test_owner }}"

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ env_file_test_dir }}"
        state: directory
        owner: "{{ env_file_test_owner }}"
        group: "{{ env_file_test_owner }}"
        mode: "0755"
