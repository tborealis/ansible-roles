---
# The role configures nvm for existing accounts; other roles create the
# accounts on real hosts, which is not part of the nvm role's contract.
- name: Prepare
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    - name: Create test user
      ansible.builtin.user:
        name: "{{ nvm_molecule_user }}"
        shell: /bin/bash
        create_home: true
