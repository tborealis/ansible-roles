---
- name: Validate PHP CLI version is supported
  ansible.builtin.assert:
    that: php_cli_version in php_cli_supported_versions
    fail_msg: "Unsupported PHP CLI version '{{ php_cli_version }}'. Supported: {{ php_cli_supported_versions | join(', ') }}"

- name: Install PHP CLI
  ansible.builtin.apt:
    pkg: "php{{ php_cli_version }}-cli"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install PHP packages
  ansible.builtin.apt:
    pkg: "{{ php_cli_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Xdebug
  ansible.builtin.apt:
    pkg: php{{ php_cli_version }}-xdebug
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: php_cli_xdebug
  register: php_cli_xdebug_installed

- name: Disable xdebug by default
  ansible.builtin.file:
    path: "/etc/php/{{ php_cli_version }}/cli/conf.d/20-xdebug.ini"
    state: absent

- name: Apply PHP CLI settings
  ansible.builtin.template:
    src: "php{{ php_cli_version }}.ini.j2"
    dest: "/etc/php/{{ php_cli_version }}/cli/php.ini"
    owner: root
    group: root
    mode: "0644"

