---
- name: Assert node_version is set
  ansible.builtin.assert:
    that:
      - node_version is defined
      - node_version | string is match('^[0-9]+$')
    fail_msg: node_version must be set to the Node.js major to install (e.g. 22).

- name: Migrate away from the apt-installed Yarn
  ansible.builtin.import_tasks: yarn-apt-migration.yml

- name: Install Node from NodeSource
  ansible.builtin.import_tasks: apt.yml

- name: Remove stale corepack shims
  ansible.builtin.import_tasks: corepack-cleanup.yml

- name: Install package managers and global packages
  ansible.builtin.import_tasks: package-managers.yml
