---
- name: Remove historic node repo
  ansible.builtin.import_tasks: remove-old-node-repo.yml

- name: Install deb822 dependency
  ansible.builtin.apt:
    pkg: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add Node repo
  ansible.builtin.deb822_repository:
    name: nodesource
    types: [deb]
    uris: "https://deb.nodesource.com/node_{{ node_version }}.x"
    suites: nodistro
    components: main
    signed_by: /etc/apt/keyrings/nodesource.gpg
  register: node_repo

- name: Update apt cache after adding repository # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: node_repo is changed

- name: Install Node
  ansible.builtin.apt:
    pkg: nodejs
    state: "{{ node_repo.changed | ternary('latest', 'present') }}"
    update_cache: true
    cache_valid_time: 3600

- name: Enable package managers via corepack
  ansible.builtin.command: >-
    corepack enable
    {{ node_corepack_enable if node_corepack_enable is string else '' }}
  changed_when: true
  when: node_corepack_enable is not false

- name: Write .npmrc
  ansible.builtin.template:
    src: "node/{{ item.template }}"
    dest: "{{ item.dir }}/.npmrc"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0600"
  with_items: "{{ node_npmrc }}"

- name: Install Node global packages
  community.general.npm:
    name: "{{ item }}"
    global: true
    production: true
  with_items: "{{ node_global_packages }}"
