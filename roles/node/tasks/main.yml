---
- name: Assert node_version is set
  ansible.builtin.assert:
    that:
      - node_version is defined
      - node_version | string is match('^[0-9]+$')
    fail_msg: node_version must be set to the Node.js major to install (e.g. 22).

- name: Assert node_version_manager is valid
  ansible.builtin.assert:
    that:
      - node_version_manager in node_version_managers
    fail_msg: "node_version_manager must be one of: {{ node_version_managers | join(', ') }}."

- name: Assert node_n_versions is only used with the n manager
  ansible.builtin.assert:
    that:
      - node_version_manager == 'n' or node_n_versions | length == 0
    fail_msg: node_n_versions requires node_version_manager "n".

- name: Assert node_nvm_config is only used with the nvm manager
  ansible.builtin.assert:
    that:
      - node_version_manager == 'nvm' or node_nvm_config | length == 0
    fail_msg: node_nvm_config requires node_version_manager "nvm".

- name: Assert numeric n versions
  ansible.builtin.assert:
    that:
      - item.version is defined
      - item.version | string is match('^[0-9]+(\.[0-9]+){0,2}$')
    fail_msg: >-
      node_n_versions entries must be numeric (20 or 20.11.0); aliases like
      "lts" cannot be converged idempotently.
  loop: "{{ node_n_versions }}"
  loop_control:
    label: "{{ item.version | default(item) }}"

- name: Migrate away from the apt-installed Yarn
  ansible.builtin.import_tasks: yarn-apt-migration.yml

- name: Install Node from NodeSource
  ansible.builtin.import_tasks: apt.yml

- name: Remove stale corepack shims
  ansible.builtin.import_tasks: corepack-cleanup.yml

- name: Install package managers and global packages
  ansible.builtin.import_tasks: package-managers.yml

- name: Cache extra Node versions with n
  ansible.builtin.import_tasks: n.yml
  when: node_version_manager == 'n'

- name: Configure per-user nvm
  ansible.builtin.import_tasks: nvm.yml
  when: node_version_manager == 'nvm'
