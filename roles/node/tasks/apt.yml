---
- name: Find legacy Node list files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    contains: 'deb\.nodesource\.com'
    read_whole_file: true
  register: node_legacy_list

- name: Remove legacy Node list files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ node_legacy_list.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: "Find NodeSource repos for majors other than {{ node_version }}"
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.sources"
    contains: 'deb\.nodesource\.com/node_(?!{{ node_version }}\.x)'
    read_whole_file: true
  register: node_other_major_repos

- name: Remove NodeSource repos for other majors
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ node_other_major_repos.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Install deb822 dependency
  ansible.builtin.apt:
    pkg: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add Node repo
  ansible.builtin.deb822_repository:
    name: nodesource
    types: [deb]
    uris: "https://deb.nodesource.com/node_{{ node_version }}.x"
    suites: nodistro
    components: main
    signed_by: /etc/apt/keyrings/nodesource.gpg
  register: node_repo

- name: Update apt cache after adding repository # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when: node_repo is changed

- name: Install Node
  ansible.builtin.apt:
    pkg: nodejs
    state: "{{ node_repo.changed | ternary('latest', 'present') }}"
    update_cache: true
    cache_valid_time: 3600
