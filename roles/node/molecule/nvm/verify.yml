---
- name: Verify
  hosts: all
  become: true
  vars_files:
    - vars.yml
  tasks:
    # nvm's init lines live in ~/.bashrc, which non-interactive shells
    # return from early, so source nvm.sh explicitly instead of using bash -l.
    - name: Check nvm version as the test user
      become_user: "{{ node_molecule_user }}"
      become: true
      ansible.builtin.shell: . "$HOME/.nvm/nvm.sh" && nvm --version
      args:
        executable: /bin/bash
      register: node_verify_nvm_version
      changed_when: false

    - name: "Assert nvm is the pinned {{ node_molecule_nvm_version }}"
      ansible.builtin.assert:
        that:
          - node_verify_nvm_version.stdout == node_molecule_nvm_version

    - name: Check the nvm clone tag as the test user # noqa: command-instead-of-module (read-only tag probe)
      become_user: "{{ node_molecule_user }}"
      become: true
      ansible.builtin.command: git -C ~/.nvm describe --tags
      register: node_verify_nvm_tag
      changed_when: false

    - name: Assert ~/.nvm is a git clone at the pinned tag
      ansible.builtin.assert:
        that:
          - node_verify_nvm_tag.stdout == 'v' ~ node_molecule_nvm_version

    - name: Read the test user's .bashrc
      ansible.builtin.slurp:
        src: "/home/{{ node_molecule_user }}/.bashrc"
      register: node_verify_bashrc

    - name: Assert .bashrc carries the managed nvm block
      ansible.builtin.assert:
        that:
          - "'# BEGIN ANSIBLE MANAGED: nvm' in node_verify_bashrc.content | b64decode"

    # Sourcing nvm.sh activates the default alias, so this checks both the
    # installed version and the default set by converge.
    - name: Check the default Node version as the test user
      become_user: "{{ node_molecule_user }}"
      become: true
      ansible.builtin.shell: . "$HOME/.nvm/nvm.sh" && node --version
      args:
        executable: /bin/bash
      register: node_verify_nvm_node
      changed_when: false

    - name: Assert the default Node major matches the converge config
      ansible.builtin.assert:
        that:
          - node_verify_nvm_node.stdout.startswith('v' ~ node_molecule_nvm_node_major ~ '.')

    - name: Run the installed global package's CLI
      become_user: "{{ node_molecule_user }}"
      become: true
      ansible.builtin.shell: >-
        . "$HOME/.nvm/nvm.sh" && {{ node_molecule_global_package }} 1.2.3
      args:
        executable: /bin/bash
      register: node_verify_nvm_global
      changed_when: false

    - name: Assert the global package works
      ansible.builtin.assert:
        that:
          - node_verify_nvm_global.stdout == '1.2.3'

    - name: Print the system Node version
      ansible.builtin.command: node --eval 'console.log(process.version)'
      register: node_verify_system_node
      changed_when: false

    - name: "Assert the system Node major matches {{ node_molecule_version }}"
      ansible.builtin.assert:
        that:
          - node_verify_system_node.stdout.startswith('v' ~ node_molecule_version ~ '.')
