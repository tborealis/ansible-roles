---
# Uninstall entrypoint, not reached from main.yml. Apply with:
#   ansible.builtin.import_role:
#     name: tborealis.roles.phpbu
#     tasks_from: remove
- name: Remove phpbu files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /var/spool/cron/crontabs/phpbu
    - /usr/local/bin/phpbu
    - /etc/phpbu.xml
    - "{{ phpbu_backup_dir }}"
    - "{{ phpbu_lib_dir }}"
    - "{{ phpbu_log_dir }}"

- name: Remove phpbu user
  ansible.builtin.user:
    name: phpbu
    state: absent
    remove: true
