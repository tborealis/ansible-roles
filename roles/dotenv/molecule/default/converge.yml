---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars.yml
  vars:
    dotenv_files:
      # Lowercase keys and a value with a space exercise the template's
      # upper-casing and shell quoting; group/mode fall back to defaults.
      - dest: "{{ dotenv_test_env_file }}"
        owner: "{{ dotenv_test_owner }}"
        vars:
          app_env: production
          app_name: Molecule App
          database_url: "{{ dotenv_test_database_url }}"
      - dest: "{{ dotenv_test_local_file }}"
        owner: "{{ dotenv_test_owner }}"
        group: root
        mode: "0600"
        vars:
          session_secret: "{{ dotenv_test_session_secret }}"
  roles:
    - role: tborealis.roles.dotenv
