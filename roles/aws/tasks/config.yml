---
- name: "Assert credential keys are paired for {{ aws_user_config.user }}"
  ansible.builtin.assert:
    that: (item.access_key_id is defined) == (item.secret_access_key is defined)
    fail_msg: "Profile '{{ item.name }}' must set both access_key_id and secret_access_key or neither."
  with_items: "{{ aws_user_config.profiles }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Per user config for {{ aws_user_config.user }}"
  become_user: "{{ aws_user_config.user }}"
  become: true
  block:
    - name: Create config dir
      ansible.builtin.file:
        state: directory
        path: "~/.aws"
        mode: "0700"

    - name: Write config files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0600"
      with_items:
        - { src: config.j2, dest: "~/.aws/config" }
        - { src: credentials.j2, dest: "~/.aws/credentials" }
      vars:
        profiles: "{{ aws_user_config.profiles }}"
