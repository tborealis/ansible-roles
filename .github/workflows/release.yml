name: release

on:
  push:
    tags: ["v*"]

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Tag matches galaxy.yml and CHANGELOG.md
        run: |
          ver="${GITHUB_REF_NAME#v}"
          gy="$(grep -E '^version:' galaxy.yml | awk '{print $2}')"
          [ "$gy" = "$ver" ] || { echo "::error::galaxy.yml ($gy) != tag ($ver)"; exit 1; }
          grep -qE "^## \[${ver}\]" CHANGELOG.md || { echo "::error::No CHANGELOG.md section for [$ver]"; exit 1; }

  release:
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Extract release notes
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '$0 ~ "^## \\["v"\\]" {f=1; next} f && /^## \[/ {exit} f' CHANGELOG.md > NOTES.md
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: NOTES.md
