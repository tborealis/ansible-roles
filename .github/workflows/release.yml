name: release

on:
  push:
    tags: ["v*"]

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Tag matches galaxy.yml and CHANGELOG.md
        run: |
          ver="${GITHUB_REF_NAME#v}"
          gy="$(grep -E '^version:' galaxy.yml | awk '{print $2}')"
          [ "$gy" = "$ver" ] || { echo "::error::galaxy.yml ($gy) != tag ($ver)"; exit 1; }
          grep -qE "^## \[${ver}\]" CHANGELOG.md || { echo "::error::No CHANGELOG.md section for [$ver]"; exit 1; }

  release:
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Extract release notes
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '$0 ~ "^## \\["v"\\]" {f=1; next} f && /^## \[/ {exit} f' CHANGELOG.md > NOTES.md
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: ${{ github.ref_name }}
          body_path: NOTES.md
