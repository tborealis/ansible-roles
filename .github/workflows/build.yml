name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"
      - run: pip install -r requirements-dev.txt
      - run: ansible-galaxy install -r requirements.yml
      - run: ansible-lint

  changelog:
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Require CHANGELOG.md update
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated."
          else
            echo "::error::CHANGELOG.md not updated. Add an entry under '## [Unreleased]' or apply the 'skip-changelog' label."
            exit 1
          fi
